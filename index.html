<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Generator</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <script>
    // Применяем тему ещё до того, как CSS загрузится
    (function () {
      const theme = localStorage.getItem("theme");
      if (theme === "dark") {
        document.documentElement.classList.add("dark-theme");
      }
    })();
  </script>
  <body class="bg-light">
    <div class="theme-switch-wrapper">
      <label class="theme-switch" for="theme-checkbox">
        <input type="checkbox" id="theme-checkbox" />
        <span class="slider round"></span>
      </label>
      <em id="theme-label">Dark theme</em>
    </div>
    <div class="container py-5">
      <h1 class="text-center mb-5">Random Quote Generator</h1>

      <div class="card shadow p-4 text-center mx-auto" style="max-width: 600px">
        <blockquote class="blockquote">
          <p id="quoteText">Click the button to generate a quote.</p>
        </blockquote>

        <footer class="blockquote-footer mt-2">
          <span id="quoteAuthor"></span>
        </footer>

        <div class="mt-4">
          <button id="newQuoteBtn" class="btn btn-primary me-2">
            Generate Quote
          </button>

          <button id="favoriteBtn" class="btn btn-outline-danger">
            ❤️ Favorites
          </button>
        </div>
      </div>

      <!-- Favorites Section -->
      <div class="mt-5">
        <h3 class="text-center mb-3">Favorites</h3>

        <ul
          id="favoritesList"
          class="list-group mx-auto"
          style="max-width: 600px"
        >
          <!-- Favorites will appear here -->
        </ul>
      </div>
    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js?v=1.0.5"></script>
  </body>
</html>
